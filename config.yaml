# Readless configuration
# Saved from the settings page on your digest site (settings.html).
# Hand edits are fine too -- saving from the web UI rewrites this file.
# Secrets never go in this file; they live in GitHub Actions secrets.

lookback_hours: 26
provider: "gemini"  # gemini (free tier) | anthropic | ollama
model: ""  # blank = provider default
ollama_url: "http://localhost:11434"
summary_style: "concise"  # concise | detailed
site_url: "https://jackdengler.github.io/digest/"
publish_email_items: false

topic_filters:
  exclude: []
  prioritize:
    - "AI"
    - "Business"
    - "Economy"
    - "Finance"
    - "Startups"

rss_feeds:
  - "https://arstechnica.com/feed/"
  - "https://www.theverge.com/rss/index.xml"
  - "https://techcrunch.com/feed/"
  - "https://hnrss.org/frontpage?points=150"
  - "https://simonwillison.net/atom/everything/"
  - "https://www.technologyreview.com/feed/"
  - "https://feeds.bbci.co.uk/news/world/rss.xml"
  - "https://feeds.npr.org/1001/rss.xml"
  - "https://rss.politico.com/politics-news.xml"
  - "https://www.quantamagazine.org/feed/"
  - "https://aeon.co/feed.rss"
  - "https://www.themarginalian.org/feed/"

substacks:
  - "https://importai.substack.com/"
  - "https://www.oneusefulthing.org/"
  - "@garymarcus"
  - "https://www.astralcodexten.com/"
  - "https://www.thefp.com/"
  - "https://www.noahpinion.blog/"
  - "https://www.thediff.co/"
  - "https://www.slowboring.com/"

# Sources unchecked on the settings page -- kept here so they can be re-enabled.
disabled_rss_feeds: []
disabled_substacks: []

email:
  imap_host: "imap.gmail.com"
  username: "jdengler@compensia.com"
  label: "Newsletters"
  mark_as_read: false

smtp:
  host: "smtp.gmail.com"
  port: 465
  username: ""  # blank = reuse email.username
  to: ""  # blank = send to yourself; commas for multiple
