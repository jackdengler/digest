name: Deploy site

# Publishes site/ to GitHub Pages whenever it changes on main, so settings-page
# and digest commits go live immediately instead of waiting for the next daily
# digest run (which also deploys, but only once a day).
on:
  push:
    branches: [main]
    paths: ["site/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write # deploy to GitHub Pages
  id-token: write # OIDC token used by deploy-pages

concurrency:
  group: pages-deploy
  cancel-in-progress: false

env:
  # Run JS-based actions on Node 24 ahead of GitHub's June 16, 2026 default
  # switch; silences the Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
